[project]
name = "formkit-ninja"
version = "0.7.4"
description = "A Django-Ninja backend to specify FormKit schemas"
authors = [
    { name = "Josh Brooks", email = "josh@catalpa.io" }
]
dependencies = [
    "django-ninja==0.22.2",
    "Django",
    "django-pgtrigger",
    "django-pghistory"
]


readme = "README.md"
requires-python = ">= 3.12"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies= [
  "pytest",
  "pytest-django",
  "pytest-playwright",
  "pytest-cov[all]",
  "rich",
  "django-stubs",
  "psycopg2-binary",
  "playwright",
  "jinja2"
]


[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/formkit_ninja"]
exclude = [".venv", "tests", "formkit_ninja/samples"]

[tool.hatch.build.targets.sdist]
packages = ["src/formkit_ninja"]
exclude = [".venv", "tests", "formkit_ninja/samples"]